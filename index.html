<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PRO PANEL DASHBOARD</title>

<link
href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css"
rel="stylesheet">

<style>

:root{
--primary:#00f2ff;
--bg:#0d0d0d;
--card:#161616;
--border:#333;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:var(--bg);

background-size:cover;
background-position:center;
background-repeat:no-repeat;

color:#fff;
font-family:'Segoe UI',sans-serif;

display:none;

height:100vh;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{

width:260px;
height:100vh;

background:#111;

border-right:1px solid var(--border);

padding:25px;

display:flex;
flex-direction:column;
}

.sidebar h2{

color:var(--primary);

margin-bottom:40px;

display:flex;
align-items:center;
gap:10px;
}

.menu-item{

display:flex;
align-items:center;
gap:15px;

padding:12px 15px;

color:#aaa;

border-radius:10px;

margin-bottom:8px;

cursor:pointer;

transition:.3s;
}

.menu-item:hover,
.menu-item.active{

background:rgba(0,242,255,.1);

color:var(--primary);
}

/* MAIN */

.main{

flex:1;

padding:40px;

overflow-y:auto;
}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;
}

.profile{

display:flex;
align-items:center;
gap:15px;

background:rgba(255,255,255,.05);

padding:8px 20px;

border-radius:50px;

border:1px solid #444;

backdrop-filter:blur(10px);
}

.profile img{

width:45px;
height:45px;

border-radius:50%;

border:2px solid var(--primary);

object-fit:cover;
}

/* CARD */

.card{

background:rgba(22,22,22,.9);

padding:25px;

border-radius:15px;

border:1px solid var(--border);

margin-bottom:20px;

backdrop-filter:blur(10px);
}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));

gap:20px;
}

.value{

font-size:24px;

font-weight:bold;

color:var(--primary);

margin-top:10px;
}

/* TAB */

.tab-content{
display:none;
}

.tab-content.active{
display:block;
}

.hidden{
display:none !important;
}

/* BUTTON */

button{

background:var(--primary);

color:#000;

border:none;

padding:12px 15px;

border-radius:10px;

font-weight:bold;

cursor:pointer;

transition:.3s;
}

button:hover{
opacity:.8;
transform:scale(1.02);
}

/* INPUT */

input{

width:100%;

padding:12px;

margin-top:12px;

background:#222;

border:1px solid #444;

border-radius:10px;

color:#fff;

outline:none;
}

input:focus{

border:1px solid var(--primary);

box-shadow:0 0 10px rgba(0,242,255,.3);
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>
<i class="ri-shield-flash-line"></i>
PRO PANEL
</h2>

<div
class="menu-item active"
onclick="openTab(event,'dash')">

<i class="ri-dashboard-line"></i>
Dashboard

</div>

<div
class="menu-item"
onclick="openTab(event,'profile')">

<i class="ri-user-settings-line"></i>
Avatar

</div>

<div
class="menu-item"
onclick="openTab(event,'theme')">

<i class="ri-image-line"></i>
Đổi nền

</div>

<!-- ADMIN NAV -->

<div
id="admin-nav"
class="hidden">

<hr style="border:.5px solid #333;margin:15px 0;">

<div
class="menu-item"
onclick="openTab(event,'admin')">

<i class="ri-group-line"></i>
Admin

</div>

</div>

<!-- LOGOUT -->

<div
class="menu-item"
onclick="logout()"
style="margin-top:auto;color:#ff4d4d">

<i class="ri-logout-box-line"></i>
Đăng xuất

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="header">

<h1 id="tab-title">
Dashboard
</h1>

<div class="profile">

<div style="text-align:right">

<b id="u-name">
Loading...
</b>

<br>

<small
id="u-role"
style="color:var(--primary)">

USER

</small>

</div>

<img
id="u-avt"
src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

</div>

</div>

<!-- DASHBOARD -->

<div
id="dash"
class="tab-content active">

<div class="grid">

<div class="card">

<h3>
Trạng thái tài khoản
</h3>

<div
class="value"
style="color:#00ff00">

Đang hoạt động

</div>

</div>

<div class="card">

<h3>
Email
</h3>

<div
class="value"
id="u-email">

...

</div>

</div>

</div>

</div>

<!-- PROFILE -->

<div
id="profile"
class="tab-content">

<div
class="card"
style="max-width:500px;">

<h3>
Đổi Avatar
</h3>

<input
type="text"
id="avatar-url"
placeholder="https://example.com/avatar.png">

<button
onclick="changeAvatar()"
style="margin-top:12px;width:100%">

Cập nhật Avatar

</button>

</div>

</div>

<!-- THEME -->

<div
id="theme"
class="tab-content">

<div
class="card"
style="max-width:500px;">

<h3>
Đổi Background
</h3>

<input
type="text"
id="bg-url"
placeholder="https://example.com/background.jpg">

<button
onclick="changeBackground()"
style="margin-top:12px;width:100%">

Đổi Background

</button>

<button
onclick="resetBackground()"
style="margin-top:10px;width:100%;background:#ff4d4d;color:#fff;">

Reset Background

</button>

</div>

</div>

<!-- ADMIN -->

<div
id="admin"
class="tab-content">

<div class="card">

<h3>
ADMIN PANEL
</h3>

<p style="margin-top:10px;">
Chỉ tài khoản admin mới thấy mục này.
</p>

<br>

<input
type="text"
placeholder="Nhập email user">

<button style="margin-top:10px;">
Khóa tài khoản
</button>

<button
style="margin-top:10px;background:#ff4d4d;color:#fff;">

Xóa user

</button>

</div>

</div>

</div>

<script type="module">

/* FIREBASE */

import {
initializeApp
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getAuth,
onAuthStateChanged,
signOut,
updateProfile

}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* CONFIG */

const firebaseConfig={

apiKey:"AIzaSyCfl2DViL6ehjDDzay0yWBnkzZtw7X5yW8",

authDomain:"create-a-73522.firebaseapp.com",

projectId:"create-a-73522",

storageBucket:"create-a-73522.appspot.com",

messagingSenderId:"595740220490",

appId:"1:595740220490:web:61f9784c5f678299cf5ab3"
};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

/* LOAD BG */

const savedBg=
localStorage.getItem("panel_bg");

if(savedBg){

document.body.style.backgroundImage=
`url('${savedBg}')`;
}

/* CHECK LOGIN */

onAuthStateChanged(auth,(user)=>{

if(user){

document.body.style.display="flex";

/* USER INFO */

document
.getElementById('u-name')
.innerText=
user.displayName || "USER";

document
.getElementById('u-email')
.innerText=
user.email;

document
.getElementById('u-avt')
.src=
user.photoURL ||
"https://cdn-icons-png.flaticon.com/512/149/149071.png";

/* ADMIN */

if(user.email==="admin@pro.com"){

document
.getElementById('u-role')
.innerText="ADMIN";

document
.getElementById('admin-nav')
.classList.remove('hidden');

}else{

document
.getElementById('u-role')
.innerText="USER";
}

}else{

window.location.href="index.html";
}
});

/* TAB */

window.openTab=(e,id)=>{

document
.querySelectorAll('.tab-content')
.forEach(t=>t.classList.remove('active'));

document
.querySelectorAll('.menu-item')
.forEach(m=>m.classList.remove('active'));

document
.getElementById(id)
.classList.add('active');

e.currentTarget
.classList.add('active');

document
.getElementById('tab-title')
.innerText=
e.currentTarget.innerText;
}

/* LOGOUT */

window.logout=async()=>{

await signOut(auth);

window.location.href="index.html";
}

/* CHANGE AVATAR */

window.changeAvatar=async()=>{

const url=
document
.getElementById('avatar-url')
.value;

if(!url){

return alert("Nhập link ảnh!");
}

try{

await updateProfile(
auth.currentUser,
{
photoURL:url
}
);

document
.getElementById('u-avt')
.src=url;

alert("Đổi avatar thành công!");

}catch(error){

alert(error.message);
}
}

/* CHANGE BACKGROUND */

window.changeBackground=()=>{

const url=
document
.getElementById('bg-url')
.value;

if(!url){

return alert("Nhập link ảnh!");
}

document.body.style.backgroundImage=
`url('${url}')`;

localStorage.setItem(
"panel_bg",
url
);

alert("Đổi nền thành công!");
}

/* RESET BACKGROUND */

window.resetBackground=()=>{

localStorage.removeItem("panel_bg");

document.body.style.backgroundImage="none";

document.body.style.background=
"var(--bg)";

alert("Đã reset nền!");
}

console.log("DASHBOARD OK");

</script>

</body>
</html>
