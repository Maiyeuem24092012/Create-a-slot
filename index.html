FILE 1: index.html
========================= -->

<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PRO PANEL LOGIN</title>

<link
href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css"
rel="stylesheet"
/>

<style>

:root{
    --primary:#00f2ff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Segoe UI',sans-serif;

    background:#000;

    color:#fff;

    height:100vh;

    overflow:hidden;

    display:flex;

    align-items:center;

    justify-content:center;
}

.login__img{

    position:absolute;

    width:100%;
    height:100%;

    object-fit:cover;

    z-index:-1;

    filter:brightness(.35);
}

.form-card{

    width:390px;

    padding:2rem;

    border-radius:25px;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(18px);

    box-shadow:
    0 0 25px rgba(0,242,255,.15),
    0 10px 40px rgba(0,0,0,.5);
}

.title{

    text-align:center;

    margin-bottom:25px;

    color:var(--primary);

    font-size:1.7rem;

    letter-spacing:2px;
}

.input-box{

    display:flex;

    align-items:center;

    gap:10px;

    border-bottom:2px solid rgba(255,255,255,.15);

    padding:12px 0;

    margin-bottom:18px;
}

.input-box input{

    width:100%;

    background:none;

    border:none;

    outline:none;

    color:#fff;

    font-size:15px;
}

.eye{

    cursor:pointer;
}

.btn{

    width:100%;

    padding:13px;

    border:none;

    border-radius:12px;

    background:var(--primary);

    color:#000;

    font-weight:700;

    cursor:pointer;

    margin-top:10px;
}

.btn:hover{

    box-shadow:
    0 0 10px var(--primary),
    0 0 30px var(--primary);
}

.hidden{
    display:none !important;
}

.link{

    color:var(--primary);

    cursor:pointer;
}

.info{

    text-align:center;

    margin-top:15px;
}

</style>

</head>

<body>

<img
src="https://github.com/Prilist08/Login-Form/blob/main/Github/login-bg.png?raw=true"
class="login__img"
>

<!-- LOGIN -->

<div class="form-card" id="login-section">

<h2 class="title">ĐĂNG NHẬP</h2>

<form id="loginForm">

<div class="input-box">

<i class="ri-mail-line"></i>

<input
type="email"
id="l-email"
placeholder="Email"
required>

</div>

<div class="input-box">

<i class="ri-lock-line"></i>

<input
type="password"
id="l-pass"
placeholder="Mật khẩu"
required>

<i
class="ri-eye-line eye"
onclick="togglePassword('l-pass',this)">
</i>

</div>

<button class="btn">

ĐĂNG NHẬP

</button>

<button
type="button"
class="btn"
onclick="googleLogin()">

Google Login

</button>

<p class="info">

Chưa có tài khoản?

<span
class="link"
onclick="showForm('reg')">

Đăng ký

</span>

</p>

<p class="info">

<span
class="link"
onclick="showForm('forgot')">

Quên mật khẩu?

</span>

</p>

</form>

</div>

<!-- REGISTER -->

<div class="form-card hidden" id="reg-section">

<h2 class="title">ĐĂNG KÝ</h2>

<form id="regForm">

<div class="input-box">

<i class="ri-user-line"></i>

<input
type="text"
id="r-name"
placeholder="Tên hiển thị"
required>

</div>

<div class="input-box">

<i class="ri-mail-line"></i>

<input
type="email"
id="r-email"
placeholder="Email"
required>

</div>

<div class="input-box">

<i class="ri-lock-line"></i>

<input
type="password"
id="r-pass"
placeholder="Mật khẩu"
required>

<i
class="ri-eye-line eye"
onclick="togglePassword('r-pass',this)">
</i>

</div>

<button class="btn">

TẠO TÀI KHOẢN

</button>

<p class="info">

<span
class="link"
onclick="showForm('login')">

Quay lại

</span>

</p>

</form>

</div>

<!-- FORGOT -->

<div class="form-card hidden" id="forgot-section">

<h2 class="title">RESET PASSWORD</h2>

<div class="input-box">

<i class="ri-mail-line"></i>

<input
type="email"
id="f-email"
placeholder="Nhập email">

</div>

<button
class="btn"
onclick="sendReset()">

Gửi Email Reset

</button>

<p class="info">

<span
class="link"
onclick="showForm('login')">

Quay lại

</span>

</p>

</div>

<script type="module">

import {
initializeApp
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getAuth,

createUserWithEmailAndPassword,

signInWithEmailAndPassword,

GoogleAuthProvider,

signInWithPopup,

sendPasswordResetEmail,

updateProfile

}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig={

apiKey:"AIzaSyCfl2DViL6ehjDDzay0yWBnkzZtw7X5yW8",

authDomain:"create-a-73522.firebaseapp.com",

projectId:"create-a-73522",

storageBucket:"create-a-73522.firebasestorage.app",

messagingSenderId:"595740220490",

appId:"1:595740220490:web:61f9784c5f678299cf5ab3"
};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const provider=new GoogleAuthProvider();

provider.setCustomParameters({
prompt:"select_account"
});

window.showForm=(id)=>{

document
.querySelectorAll('.form-card')
.forEach(el=>el.classList.add('hidden'));

document
.getElementById(id+'-section')
.classList.remove('hidden');
}

window.togglePassword=(id,icon)=>{

const input=document.getElementById(id);

if(input.type==="password"){

input.type="text";

icon.classList.replace(
'ri-eye-line',
'ri-eye-off-line'
);

}else{

input.type="password";

icon.classList.replace(
'ri-eye-off-line',
'ri-eye-line'
);
}
}

/* REGISTER */

document
.getElementById('regForm')
.addEventListener('submit',async(e)=>{

e.preventDefault();

const name=document
.getElementById('r-name').value;

const email=document
.getElementById('r-email').value;

const password=document
.getElementById('r-pass').value;

try{

const userCredential=
await createUserWithEmailAndPassword(
auth,
email,
password
);

await updateProfile(
userCredential.user,
{
displayName:name
}
);

alert("Đăng ký thành công!");

showForm('login');

}catch(error){

alert(error.message);
}
});

/* LOGIN */

document
.getElementById('loginForm')
.addEventListener('submit',async(e)=>{

e.preventDefault();

const email=document
.getElementById('l-email').value;

const password=document
.getElementById('l-pass').value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

alert("Đăng nhập thành công!");

setTimeout(()=>{

window.location.href="dashboard.html";

},1000);

}catch(error){

alert(error.message);
}
});

/* GOOGLE */

window.googleLogin=async()=>{

try{

await signInWithPopup(auth,provider);

alert("Google login thành công!");

window.location.href="dashboard.html";

}catch(error){

alert(error.message);
}
}

/* RESET */

window.sendReset=async()=>{

const email=document
.getElementById('f-email').value;

try{

await sendPasswordResetEmail(
auth,
email
);

alert("Đã gửi email reset!");

}catch(error){

alert(error.message);
}
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<title>PRO PANEL</title>

<style>

body{

background:#000;

color:#fff;

font-family:sans-serif;

padding:30px;
}

button{

padding:12px 20px;

border:none;

background:cyan;

cursor:pointer;

font-weight:bold;
}

</style>

</head>

<body style="display:none">

<h1>WELCOME TO PANEL</h1>

<h2 id="user"></h2>

<button onclick="logout()">

ĐĂNG XUẤT

</button>

<script type="module">

import {
initializeApp
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getAuth,

onAuthStateChanged,

signOut

}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig={

apiKey:"AIzaSyCfl2DViL6ehjDDzay0yWBnkzZtw7X5yW8",

authDomain:"create-a-73522.firebaseapp.com",

projectId:"create-a-73522",

storageBucket:"create-a-73522.firebasestorage.app",

messagingSenderId:"595740220490",

appId:"1:595740220490:web:61f9784c5f678299cf5ab3"
};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

onAuthStateChanged(auth,(user)=>{

if(user){

document.body.style.display="block";

document
.getElementById("user")
.innerHTML=user.email;

}else{

window.location.href="index.html";
}
});

window.logout=async()=>{

await signOut(auth);

window.location.href="index.html";
}

</script>

</body>
</html>
