<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PRO PANEL LOGIN</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>

:root{
    --primary:#00f2ff;
    --bg:#000;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    background:#000;
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
}

.login__img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
    filter:brightness(.35);
}

.form-card{

    width:390px;
    padding:2rem;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.1);

    border-radius:24px;

    backdrop-filter:blur(20px);

    box-shadow:
    0 0 20px rgba(0,242,255,.15),
    0 15px 35px rgba(0,0,0,.5);

    animation:fade .5s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.title{
    text-align:center;
    margin-bottom:25px;
    color:var(--primary);
    font-size:1.7rem;
    letter-spacing:2px;
}

.input-box{

    display:flex;
    align-items:center;
    gap:10px;

    padding:12px 0;

    border-bottom:2px solid rgba(255,255,255,.2);

    margin-bottom:18px;
}

.input-box input{

    width:100%;
    background:none;
    border:none;
    outline:none;
    color:#fff;
    font-size:15px;
}

.input-box i{
    font-size:20px;
}

.eye{
    cursor:pointer;
    transition:.3s;
}

.eye:hover{
    color:var(--primary);
}

.btn{

    width:100%;
    padding:13px;

    border:none;
    border-radius:12px;

    background:var(--primary);

    color:#000;

    font-weight:700;

    cursor:pointer;

    transition:.3s;

    margin-top:10px;
}

.btn:hover{

    transform:translateY(-2px);

    box-shadow:
    0 0 10px var(--primary),
    0 0 30px var(--primary);
}

.divider{

    margin:22px 0;
    border-bottom:1px solid rgba(255,255,255,.2);
    position:relative;
}

.divider span{

    position:absolute;
    top:-10px;
    left:50%;

    transform:translateX(-50%);

    background:#111;
    padding:0 10px;

    font-size:12px;
    color:#999;
}

.options{

    display:flex;
    justify-content:space-between;
    font-size:13px;

    margin-top:-5px;
}

.link{
    color:var(--primary);
    cursor:pointer;
}

.link:hover{
    text-decoration:underline;
}

.hidden{
    display:none !important;
}

#google-btn{
    display:flex;
    justify-content:center;
    margin-top:15px;
}

</style>
</head>

<body>

<img
src="https://github.com/Prilist08/Login-Form/blob/main/Github/login-bg.png?raw=true"
class="login__img"
>

<!-- LOGIN -->

<div class="form-card" id="login-section">

    <h2 class="title">ĐĂNG NHẬP</h2>

    <form id="loginForm">

        <div class="input-box">
            <i class="ri-mail-line"></i>

            <input
            type="email"
            id="l-email"
            placeholder="Email"
            required>
        </div>

        <div class="input-box">

            <i class="ri-lock-line"></i>

            <input
            type="password"
            id="l-pass"
            placeholder="Mật khẩu"
            required>

            <i
            class="ri-eye-line eye"
            onclick="togglePassword('l-pass',this)">
            </i>

        </div>

        <div class="options">

            <label>
                <input type="checkbox" id="remember">
                Ghi nhớ
            </label>

            <span class="link" onclick="showForm('forgot')">
                Quên mật khẩu?
            </span>

        </div>

        <button class="btn" type="submit">
            ĐĂNG NHẬP
        </button>

        <div class="divider">
            <span>HOẶC</span>
        </div>

        <div id="google-btn"></div>

        <p style="text-align:center;margin-top:20px;font-size:14px">
            Chưa có tài khoản?

            <span class="link" onclick="showForm('reg')">
                Đăng ký
            </span>
        </p>

    </form>
</div>

<!-- REGISTER -->

<div class="form-card hidden" id="reg-section">

    <h2 class="title">ĐĂNG KÝ</h2>

    <form id="regForm">

        <div class="input-box">

            <i class="ri-user-line"></i>

            <input
            type="text"
            id="r-name"
            placeholder="Tên hiển thị"
            required>

        </div>

        <div class="input-box">

            <i class="ri-mail-line"></i>

            <input
            type="email"
            id="r-email"
            placeholder="Email"
            required>

        </div>

        <div class="input-box">

            <i class="ri-lock-line"></i>

            <input
            type="password"
            id="r-pass"
            placeholder="Mật khẩu"
            required>

            <i
            class="ri-eye-line eye"
            onclick="togglePassword('r-pass',this)">
            </i>

        </div>

        <button class="btn">
            TẠO TÀI KHOẢN
        </button>

        <p style="text-align:center;margin-top:15px">

            <span class="link" onclick="showForm('login')">
                Quay lại
            </span>

        </p>

    </form>

</div>

<!-- FORGOT -->

<div class="form-card hidden" id="forgot-section">

    <h2 class="title">KHÔI PHỤC</h2>

    <div id="otp-step-1">

        <div class="input-box">

            <i class="ri-mail-line"></i>

            <input
            type="email"
            id="f-email"
            placeholder="Email">

        </div>

        <button class="btn" onclick="sendOTP()">
            Gửi OTP
        </button>

    </div>

    <div id="otp-step-2" class="hidden">

        <p style="text-align:center;color:var(--primary);font-size:13px;margin-bottom:15px">

            OTP demo: 123456

        </p>

        <div class="input-box">

            <i class="ri-key-line"></i>

            <input
            type="text"
            id="otp-code"
            placeholder="Nhập OTP">

        </div>

        <button class="btn" onclick="verifyOTP()">
            Xác nhận OTP
        </button>

    </div>

    <div id="otp-step-3" class="hidden">

        <div class="input-box">

            <i class="ri-lock-line"></i>

            <input
            type="password"
            id="new-pass"
            placeholder="Mật khẩu mới">

            <i
            class="ri-eye-line eye"
            onclick="togglePassword('new-pass',this)">
            </i>

        </div>

        <div class="input-box">

            <i class="ri-lock-password-line"></i>

            <input
            type="password"
            id="confirm-pass"
            placeholder="Nhập lại mật khẩu">

            <i
            class="ri-eye-line eye"
            onclick="togglePassword('confirm-pass',this)">
            </i>

        </div>

        <button class="btn" onclick="changePassword()">
            Đổi mật khẩu
        </button>

    </div>

    <p style="text-align:center;margin-top:15px">

        <span class="link" onclick="showForm('login')">
            Hủy
        </span>

    </p>

</div>

<script>

/*
============================
SERVER STORAGE GIẢ
============================

Muốn lưu server thật:
- PHP + MySQL
- NodeJS + MongoDB
- Firebase

Hiện tại:
localStorage giả lập database
*/

if(!localStorage.getItem('all_users')){

    localStorage.setItem(
        'all_users',

        JSON.stringify([

            {
                name:"Admin",
                email:"admin@pro.com",
                pass:btoa("admin123"),
                role:"admin",
                avatar:""
            }

        ])
    )
}

function showForm(id){

    document
    .querySelectorAll('.form-card')
    .forEach(el=>el.classList.add('hidden'))

    document
    .getElementById(id+'-section')
    .classList.remove('hidden')
}

function togglePassword(id,icon){

    const input=document.getElementById(id)

    if(input.type==="password"){

        input.type="text"

        icon.classList.replace(
            'ri-eye-line',
            'ri-eye-off-line'
        )

    }else{

        input.type="password"

        icon.classList.replace(
            'ri-eye-off-line',
            'ri-eye-line'
        )
    }
}

window.onload=function(){

    google.accounts.id.initialize({

        client_id:"462833980584-ep3ttbi79s3ihl450nbcgo7rb22q4b7m.apps.googleusercontent.com",

        callback:handleCredentialResponse
    })

    google.accounts.id.renderButton(

        document.getElementById("google-btn"),

        {
            theme:"outline",
            size:"large",
            width:300
        }
    )
}

function decodeJwtResponse(token){

    let base64Url=token.split('.')[1]

    let base64=base64Url
    .replace(/-/g,'+')
    .replace(/_/g,'/')

    return JSON.parse(atob(base64))
}

function handleCredentialResponse(response){

    const payload=decodeJwtResponse(response.credential)

    let allUsers=JSON.parse(
        localStorage.getItem('all_users')
    )

    let user=allUsers.find(
        u=>u.email===payload.email
    )

    if(!user){

        user={

            name:payload.name,
            email:payload.email,
            pass:"google-auth",
            role:"user",
            avatar:payload.picture
        }

        allUsers.push(user)

        localStorage.setItem(
            'all_users',
            JSON.stringify(allUsers)
        )
    }

    localStorage.setItem(
        'currentUser',
        JSON.stringify(user)
    )

    alert("Đăng nhập Google thành công!")

    window.location.href="index.html"
}

/*
========================
REGISTER
========================
*/

document.getElementById('regForm')
.onsubmit=(e)=>{

    e.preventDefault()

    let allUsers=JSON.parse(
        localStorage.getItem('all_users')
    )

    const email=document
    .getElementById('r-email').value

    if(allUsers.find(u=>u.email===email)){

        return alert("Email đã tồn tại!")
    }

    const newUser={

        name:document.getElementById('r-name').value,

        email:email,

        pass:btoa(
            document.getElementById('r-pass').value
        ),

        role:"user",

        avatar:""
    }

    allUsers.push(newUser)

    localStorage.setItem(
        'all_users',
        JSON.stringify(allUsers)
    )

    alert("Đăng ký thành công!")

    showForm('login')
}

/*
========================
LOGIN
========================
*/

document.getElementById('loginForm')
.onsubmit=(e)=>{

    e.preventDefault()

    const email=document
    .getElementById('l-email').value

    const pass=btoa(
        document.getElementById('l-pass').value
    )

    let allUsers=JSON.parse(
        localStorage.getItem('all_users')
    )

    let user=allUsers.find(
        u=>u.email===email && u.pass===pass
    )

    if(user){

        localStorage.setItem(
            'currentUser',
            JSON.stringify(user)
        )

        alert("Đăng nhập thành công!")

        window.location.href="index.html"

    }else{

        alert("Sai tài khoản hoặc mật khẩu!")
    }
}

/*
========================
FORGOT PASSWORD
========================
*/

function sendOTP(){

    const email=document
    .getElementById('f-email').value

    let allUsers=JSON.parse(
        localStorage.getItem('all_users')
    )

    if(!allUsers.find(u=>u.email===email)){

        return alert("Email không tồn tại!")
    }

    document
    .getElementById('otp-step-1')
    .classList.add('hidden')

    document
    .getElementById('otp-step-2')
    .classList.remove('hidden')
}

function verifyOTP(){

    const otp=document
    .getElementById('otp-code').value

    if(otp==="123456"){

        document
        .getElementById('otp-step-2')
        .classList.add('hidden')

        document
        .getElementById('otp-step-3')
        .classList.remove('hidden')

    }else{

        alert("OTP sai!")
    }
}

function changePassword(){

    const newPass=document
    .getElementById('new-pass').value

    const confirm=document
    .getElementById('confirm-pass').value

    if(newPass.length<6){

        return alert("Mật khẩu tối thiểu 6 ký tự!")
    }

    if(newPass!==confirm){

        return alert("Mật khẩu nhập lại không khớp!")
    }

    const email=document
    .getElementById('f-email').value

    let allUsers=JSON.parse(
        localStorage.getItem('all_users')
    )

    let index=allUsers.findIndex(
        u=>u.email===email
    )

    if(index===-1){

        return alert("Không tìm thấy user!")
    }

    allUsers[index].pass=btoa(newPass)

    localStorage.setItem(
        'all_users',
        JSON.stringify(allUsers)
    )

    alert("Đổi mật khẩu thành công!")

    showForm('login')
}

</script>

</body>
</html>
